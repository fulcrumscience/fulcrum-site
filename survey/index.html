<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey - Fulcrum</title>
    <meta name="description" content="Fulcrum Survey">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0a0a0b;
            --text-primary: #fafaf9;
            --text-secondary: #a8a8a4;
            --accent: #c4a962;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
        }
        body {
            display: flex;
            flex-direction: column;
            font-family: 'Newsreader', Georgia, serif;
        }
        nav {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
        }
        .logo {
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            letter-spacing: 0.05em;
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .survey-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
        }
        [data-tf-live] {
            width: 100%;
            height: 100%;
        }
        /* Target Typeform's generated wrapper */
        [data-tf-live] > div {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
        }
        [data-tf-live] iframe {
            width: 100% !important;
            height: 100% !important;
        }
        @media (max-width: 900px) {
            nav {
                padding: 0.75rem 1rem;
            }
            .nav-links {
                display: none;
            }
            .survey-container {
                height: calc(100vh - 44px);
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Fulcrum</a>
        <ul class="nav-links">
            <li><a href="/#mission">Mission</a></li>
            <li><a href="/#model">Fellowship</a></li>
            <li><a href="/#founders">Team</a></li>
            <li><a href="mailto:hello@fulcrum.science">Contact</a></li>
        </ul>
    </nav>

    <div class="survey-container">
        <div data-tf-live="01KG54V7PHCM18E8N6611BS1J5"></div>
    </div>
    <script src="//embed.typeform.com/next/embed.js"></script>
</body>
</html>
